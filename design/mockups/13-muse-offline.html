<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>13 — Muse: Offline</title>
<link rel="stylesheet" href="shared.css?v=14">
</head>
<body>
<div class="stage">
  <div class="device" data-screen-label="13 Muse Offline">
    <div class="bg-gradient"></div>
    <div class="grid-overlay"></div>

    <div class="status-bar">
      <span>9:41</span>
      <div class="right"><span>⦸</span><span>5G</span><span>█</span></div>
    </div>

    <div class="topbar">
      <img src="assets/lionmaker-logo.png" class="logo-mark" alt="">
      <span class="wordmark">THEGRIND</span>
      <span class="topbar-status offline">// OFFLINE</span>
    </div>

    <div class="viewport board-dimmed">
      <div class="section-title">IN CONTEXT</div>
      <div class="panel project-card">
        <span class="corner tl"></span><span class="corner tr"></span>
        <div class="project-head">
          <span class="heartbeat yellow"></span>
          <span class="project-name">708 PALLISTER</span>
        </div>
      </div>
    </div>

    <div class="muse-backdrop"></div>
    <div class="muse-sheet" style="border-top-color:rgba(255,0,60,.4)">
      <div class="muse-header">
        <img src="assets/muse-portrait.png" class="muse-avatar offline" alt="Muse">
        <span class="muse-title">MUSE</span>
        <span class="muse-status offline">// OFFLINE</span>
        <button class="muse-close">×</button>
      </div>
      <div class="muse-body">
        <div class="bubble muse" style="opacity:.5">No connection. Filing paused.</div>
        <div class="bubble action" style="background:rgba(255,0,60,.06);border-color:rgba(255,0,60,.3);color:rgba(255,0,60,.7)">
          // ERROR: NO_NETWORK — MUSE REQUIRES LIVE CONNECTION
        </div>
      </div>
      <div class="muse-footer">
        <div class="muse-input-placeholder" style="opacity:.4">OFFLINE — INPUT DISABLED</div>
        <button class="muse-mic dimmed" title="offline">●</button>
        <button class="muse-send dimmed">▶</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
