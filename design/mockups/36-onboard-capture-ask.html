<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>36 — Onboard: Capture · Ask</title>
<link rel="stylesheet" href="shared.css?v=14">
</head>
<body>
<div class="stage">
  <div class="device" data-screen-label="36 Onboard Capture Ask">
    <div class="bg-gradient"></div>
    <div class="grid-overlay"></div>

    <div class="status-bar">
      <span>9:41</span>
      <div class="right"><span>●●●●</span><span>5G</span><span>█</span></div>
    </div>

    <button class="onboard-close" aria-label="Exit onboarding">×</button>

    <div class="onboard">
      <div class="onboard-musehead">
        <span class="muse-dot listening"></span>
        <img src="assets/muse-portrait.png" class="muse-avatar" alt="Muse">
        <div style="display:flex;flex-direction:column;gap:2px">
          <span class="muse-title">MUSE</span>
          <span class="muse-status listening">// ONBOARDING · CAPTURE</span>
        </div>
      </div>

      <div class="onboard-convo">
        <div class="muse-row">
          <img src="assets/muse-portrait.png" class="muse-avatar-bubble" alt="">
          <div class="capture-question">
            Walk me through what's active. Every project, what's happening.
          </div>
        </div>
        <div class="capture-subtext">// Work, personal, health, anything.</div>
      </div>

      <div class="big-mic-wrap" style="margin-top:auto">
        <div class="big-mic armed">●</div>
        <div class="mic-hint">Tap to start. Take your time — 1 to 3 minutes is normal.</div>
      </div>
    </div>

    <div class="onboard-footer-status">
      <span class="dot"></span>CAPTURE · MIC ARMED
    </div>

  </div>
  <div class="caption">36 / 42 — CAPTURE · ASK</div>
</div>
</body>
</html>
