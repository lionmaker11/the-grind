<!DOCTYPE html>

<head>

</head>
<body>
<div class="stage">

      <span>9:41</span>
      <div class="right"><span>●●●●</span><span>5G</span><span>█</span></div>
    </div>

    <div class="topbar">
      <img src="assets/lionmaker-logo.png" class="logo-mark" alt="">

      <span class="topbar-status">TUE · 18:22</span>

    <div class="viewport">
      <div class="section-title">IN CONTEXT</div>
      <div class="section-sub">0 PENDING · BOARD CLEAR</div>

      <div class="empty-state">
        <div class="empty-last">// LAST CLOSED</div>
        <div style="font-family:var(--font-body);font-size:.95rem;color:var(--text);max-width:280px;line-height:1.4">

        </div>
        <div style="font-family:var(--font-mono);font-size:.55rem;letter-spacing:1.5px;color:var(--text-muted);text-transform:uppercase">LIONMAKER SYSTEMS · 14 MIN AGO</div>

        <div style="height:28px"></div>

        <div class="empty-title">AWAITING INPUT</div>
        <div style="font-family:var(--font-mono);font-size:.65rem;letter-spacing:1.5px;color:var(--text-muted);text-transform:uppercase;max-width:240px;line-height:1.6">
          All three projects clear.<br>Tell Muse what's next.
        </div>

        <button class="empty-cta">
          <span class="dot"></span>
          <span>OPEN MUSE</span>
        </button>

        <div style="font-family:var(--font-mono);font-size:.55rem;letter-spacing:1.5px;color:var(--text-muted);text-transform:uppercase;margin-top:4px">
          OR TAP ● BOTTOM-RIGHT
        </div>

        <div style="flex:1;min-height:32px"></div>

        <div style="font-family:var(--font-mono);font-size:.6rem;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;text-align:center;padding-bottom:8px">
          // NEW PROJECT? JUST TELL MUSE.
        </div>
      </div>
    </div>

    <div class="muse-fab">●</div>
