<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>12 — Muse: Recording</title>
<link rel="stylesheet" href="shared.css?v=5">
</head>
<body>
<div class="stage">
  <div class="device" data-screen-label="12 Muse Recording">
    <div class="bg-gradient"></div>
    <div class="grid-overlay"></div>

    <div class="status-bar">
      <span>9:41</span>
      <div class="right"><span>●●●●</span><span>5G</span><span>█</span></div>
    </div>

    <div class="topbar">
      <img src="assets/lionmaker-logo.png" class="logo-mark" alt="">
      <span class="wordmark">THEGRIND</span>
      <span class="topbar-status" style="color:var(--magenta)">● RECORDING</span>
    </div>

    <div class="viewport board-dimmed">
      <div class="section-title">IN CONTEXT</div>
      <div class="panel project-card">
        <span class="corner tl"></span><span class="corner tr"></span>
        <div class="project-head">
          <span class="heartbeat yellow"></span>
          <span class="project-name">708 PALLISTER</span>
        </div>
      </div>
    </div>

    <div class="muse-backdrop"></div>
    <div class="muse-sheet">
      <div class="muse-header">
        <img src="assets/muse-portrait.png" class="muse-avatar" alt="Muse" style="animation:mic-pulse 1.2s ease-in-out infinite">
        <span class="muse-title">MUSE</span>
        <span class="muse-status listening">// LISTENING</span>
        <button class="muse-close">×</button>
      </div>
      <div class="muse-body">
        <div class="muse-row">
          <img src="assets/muse-portrait.png" class="muse-avatar-bubble" alt="">
          <div class="bubble muse">Ready. What's the work?</div>
        </div>
      </div>
      <div class="muse-footer">
        <div class="muse-input live" style="display:flex;align-items:center;padding:10px 12px">
          <span style="color:var(--text)">I need to finalize the ease</span><span style="display:inline-block;width:1px;height:16px;background:var(--magenta);margin-left:2px;animation:mic-pulse 1s ease-in-out infinite"></span>
        </div>
        <button class="muse-mic recording">●</button>
        <button class="muse-send dimmed">▶</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
