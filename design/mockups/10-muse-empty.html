<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>10 — Muse: Empty conversation</title>
<link rel="stylesheet" href="shared.css?v=5">
</head>
<body>
<div class="stage">
  <div class="device" data-screen-label="10 Muse Empty">
    <div class="bg-gradient"></div>
    <div class="grid-overlay"></div>

    <div class="status-bar">
      <span>9:41</span>
      <div class="right"><span>●●●●</span><span>5G</span><span>█</span></div>
    </div>

    <div class="topbar">
      <img src="assets/lionmaker-logo.png" class="logo-mark" alt="">
      <span class="wordmark">THEGRIND</span>
      <span class="topbar-status">TUE · 09:41</span>
    </div>

    <!-- Dimmed board behind -->
    <div class="viewport board-dimmed">
      <div class="section-title">IN CONTEXT</div>
      <div class="section-sub">3 PROJECTS · 10 PENDING</div>

      <div class="panel project-card">
        <span class="corner tl"></span><span class="corner tr"></span>
        <span class="corner bl"></span><span class="corner br"></span>
        <div class="project-head">
          <span class="heartbeat yellow"></span>
          <span class="project-name">708 PALLISTER</span>
          <span class="project-meta">5D · 3 PENDING</span>
        </div>
        <div class="task-row">
          <span class="p-badge p1">P1</span>
          <div style="flex:1;min-width:0"><div class="task-text">Call Sam re: countertop installer</div></div>
        </div>
        <div class="task-row">
          <span class="p-badge p2">P2</span>
          <div style="flex:1;min-width:0"><div class="task-text">Finalize easement SNDA provisions</div></div>
        </div>
      </div>

      <div class="panel project-card">
        <span class="corner tl"></span><span class="corner tr"></span>
        <span class="corner bl"></span><span class="corner br"></span>
        <div class="project-head">
          <span class="heartbeat green"></span>
          <span class="project-name">LIONMAKER SYSTEMS</span>
          <span class="project-meta">0D · 5 PENDING</span>
        </div>
      </div>
    </div>

    <!-- Backdrop + Sheet -->
    <div class="muse-backdrop"></div>
    <div class="muse-sheet">
      <div class="muse-header">
        <img src="assets/muse-portrait.png" class="muse-avatar" alt="Muse">
        <span class="muse-title">MUSE</span>
        <span class="muse-status">// ONLINE</span>
        <button class="muse-close">×</button>
      </div>
      <div class="muse-body">
        <div class="muse-row">
          <img src="assets/muse-portrait.png" class="muse-avatar-bubble" alt="">
          <div class="bubble muse">Ready. What's the work?</div>
        </div>
        <div class="muse-empty-greeting">
          // TAP ● TO SPEAK · OR TYPE BELOW
        </div>
      </div>
      <div class="muse-footer">
        <div class="muse-input-placeholder">TYPE OR DICTATE...</div>
        <button class="muse-mic">●</button>
        <button class="muse-send">▶</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
