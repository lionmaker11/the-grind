<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>17 — Onboard: Q1 Asking</title>
<link rel="stylesheet" href="shared.css?v=6">
</head>
<body>
<div class="stage">
  <div class="device" data-screen-label="17 Onboard Q1 Asking">
    <div class="bg-gradient"></div>
    <div class="grid-overlay"></div>

    <div class="status-bar">
      <span>9:41</span>
      <div class="right"><span>●●●●</span><span>5G</span><span>█</span></div>
    </div>

    <div class="onboard">
      <div class="onboard-musehead">
        <span class="muse-dot listening"></span>
        <img src="assets/muse-portrait.png" class="muse-avatar" alt="Muse">
        <div style="display:flex;flex-direction:column;gap:2px">
          <span class="muse-title">MUSE</span>
          <span class="muse-status listening">// ONBOARDING · 1/3</span>
        </div>
      </div>

      <div class="onboard-convo">
        <div class="muse-row">
          <img src="assets/muse-portrait.png" class="muse-avatar-bubble" alt="">
          <div class="bubble muse" style="font-size:1.05rem;line-height:1.45;padding:14px 16px">
            What projects are you running right now?
          </div>
        </div>
      </div>

      <div class="big-mic-wrap" style="margin-top:auto">
        <div class="big-mic armed">●</div>
        <div class="mic-hint">Hold to speak — release when done</div>
      </div>
    </div>

  </div>
  <div class="caption">17 / 21 — Q1 · MIC ARMED</div>
</div>
</body>
</html>
